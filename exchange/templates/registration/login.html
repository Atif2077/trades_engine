<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Trades</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card p-4 shadow-sm border-0">
                <h4 class="mb-4 text-center fw-bold">System Login</h4>
                
                {% if form.errors %}
                <div class="alert alert-danger p-2 small">Invalid username or password.</div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label text-muted small fw-bold">USERNAME</label>
                        <input type="text" name="username" class="form-control bg-light" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted small fw-bold">PASSWORD</label>
                        <input type="password" name="password" class="form-control bg-light" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 fw-bold">Secure Sign In</button>
                </form>
                
            </div>
        </div>
    </div>
</div>

</body>
</html>
